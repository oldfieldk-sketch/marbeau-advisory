<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marbeau Advisory</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #F4EBDC;
      color: #071E3D;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 36px 58px 10px;
      z-index: 2;
    }

    .brand {
      font-size: 26px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      font-weight: normal;
      color: #071E3D;
    }

    .icons {
      display: flex;
      align-items: center;
      gap: 15px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    .icons a {
      color: #071E3D;
      text-decoration: none;
      line-height: 1;
    }

    .icons a:hover {
      opacity: 0.65;
    }

    .linkedin {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid #071E3D;
      padding: 1px 3px;
      line-height: 1;
      color: #071E3D;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      padding: 118px 58px 90px;
      position: relative;
    }

    .content {
      max-width: 610px;
      z-index: 2;
    }

    h1 {
      font-size: 20px;
      line-height: 1.45;
      font-weight: normal;
      letter-spacing: 1.55px;
      text-transform: uppercase;
      margin: 0 0 28px;
      color: #071E3D;
    }

    .accent {
      width: 54px;
      height: 2px;
      background: #071E3D;
      margin: 0;
    }

    .mark {
      position: absolute;
      right: 11%;
      top: 34%;
      width: 310px;
      height: 310px;
      border-radius: 50%;
      border: 1px solid rgba(7, 30, 61, 0.10);
      opacity: 0.45;
      z-index: 1;
    }

    .mark::before {
      content: "";
      position: absolute;
      inset: 48px;
      border-radius: 50%;
      border: 1px solid rgba(7, 30, 61, 0.07);
    }

    .mark::after {
      content: "";
      position: absolute;
      inset: 96px;
      border-radius: 50%;
      background: rgba(170, 190, 210, 0.12);
    }

    footer {
      background: #071E3D;
      color: #F4EBDC;
      text-align: center;
      padding: 26px 20px;
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
    }

    footer a {
      color: #F4EBDC;
      text-decoration: none;
    }

    .copyright {
      margin-top: 16px;
      font-size: 10.5px;
      color: #AABED2;
    }

    @media (max-width: 760px) {
      header {
        padding: 30px 28px 10px;
        align-items: flex-start;
      }

      .brand {
        font-size: 22px;
        letter-spacing: 3px;
      }

      .icons {
        gap: 12px;
        font-size: 12px;
        padding-top: 5px;
      }

      main {
        padding: 76px 28px 90px;
      }

      h1 {
        font-size: 18px;
        line-height: 1.5;
      }

      .mark {
        right: -90px;
        top: 50%;
        width: 240px;
        height: 240px;
        opacity: 0.30;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="brand">Marbeau</div>

      <div class="icons">
        <a href="tel:16462267600" aria-label="Phone">☎</a>
        <a href="mailto:info@marbeauadvisory.com" aria-label="Email">✉</a>
        <a href="https://www.linkedin.com/in/kristaoldfield/" target="_blank" aria-label="LinkedIn">
          <span class="linkedin">in</span>
        </a>
      </div>
    </header>

    <main>
      <section class="content">
        <h1>
          
          Marbeau Advisory supports companies, funds, and investment platforms at the intersection of global market access, capital strategy, and strategic partnerships.
   
        </h1>

        <div class="accent"></div>
      </section>

      <div class="mark"></div>
    </main>

    <footer>
      <a href="mailto:info@marbeauadvisory.com">info@marbeauadvisory.com</a>
      &nbsp; | &nbsp;
      <a href="https://www.linkedin.com/in/kristaoldfield/" target="_blank">LinkedIn</a>

      <div class="copyright">
        © 2026 Marbeau Advisory. All rights reserved.
      </div>
    </footer>
  </div>
</body>
</html>
