<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marbeau Advisory</title>

  <meta
    name="description"
    content="Marbeau advises companies, funds, and mission-driven organizations on how to expand across markets, strengthen positioning, and build the ecosystem needed to access aligned capital."
  />

  <style>
    :root {
      --bg: #fdfefe;
      --ink: #174a73;
      --ink-soft: #6f90ac;
      --line: #c8d9e8;
      --graphic: #174a73;

      --page-x: clamp(1.75rem, 4.8vw, 4.75rem);
      --top-y: clamp(2rem, 3vw, 3rem);

      --brand-size: clamp(1.8rem, 1.35rem + 0.9vw, 2.3rem);
      --subbrand-size: clamp(0.82rem, 0.72rem + 0.18vw, 1rem);
      --hero-size: clamp(1.18rem, 0.95rem + 0.8vw, 1.72rem);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 76% 45%, rgba(23, 74, 115, 0.035), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      isolation: isolate;
    }

    .frame {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding-left: var(--page-x);
      padding-right: var(--page-x);
    }

    header {
      position: relative;
      z-index: 3;
      padding-top: var(--top-y);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .brand {
      font-size: var(--brand-size);
      line-height: 1;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: normal;
      color: var(--ink);
    }

    .subbrand {
      margin-top: 0.58rem;
      font-family: Arial, sans-serif;
      font-size: var(--subbrand-size);
      line-height: 1;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .icons {
      display: flex;
      align-items: center;
      gap: 1.45rem;
      padding-top: 0.8rem;
      font-family: Arial, sans-serif;
    }

    .icons a {
      color: var(--ink-soft);
      display: inline-grid;
      place-items: center;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .icons a:hover {
      color: var(--ink);
      transform: translateY(-1px);
    }

    .icons svg {
      width: 0.95rem;
      height: 0.95rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    main {
      position: relative;
      z-index: 2;
    }

    .hero {
      display: grid;
      align-items: start;
      min-height: 62vh;
      padding-top: clamp(5.8rem, 14vh, 9.2rem);
      padding-bottom: clamp(4rem, 8vh, 6rem);
    }

    .content {
      max-width: 35rem;
      margin-left: clamp(0.5rem, 2.4vw, 2.5rem);
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: var(--hero-size);
      line-height: 1.4;
      letter-spacing: -0.012em;
      font-weight: normal;
      color: var(--ink);
    }

    .accent {
      width: 5.2rem;
      height: 2px;
      background: var(--line);
      margin-top: 1.9rem;
      border-radius: 999px;
    }

    .background-ecosystem {
      position: absolute;
      right: -8%;
      top: 10%;
      width: min(64vw, 900px);
      height: auto;
      z-index: 1;
      pointer-events: none;
      opacity: 0.95;
    }

    .background-ecosystem svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .orbital {
      fill: none;
      stroke: rgba(23, 74, 115, 0.095);
      stroke-width: 1;
    }

    .orbital-soft {
      fill: none;
      stroke: rgba(23, 74, 115, 0.055);
      stroke-width: 1;
    }

    .arc {
      fill: none;
      stroke: rgba(23, 74, 115, 0.18);
      stroke-width: 1.1;
      stroke-linecap: round;
    }

    .arc-soft {
      fill: none;
      stroke: rgba(23, 74, 115, 0.10);
      stroke-width: 0.9;
      stroke-dasharray: 2 8;
      stroke-linecap: round;
    }

    .node {
      fill: #ffffff;
      stroke: rgba(23, 74, 115, 0.26);
      stroke-width: 1;
    }

    .node-core {
      fill: rgba(23, 74, 115, 0.08);
      stroke: rgba(23, 74, 115, 0.28);
      stroke-width: 1.1;
    }

    .small-dot {
      fill: rgba(23, 74, 115, 0.24);
    }

    footer {
      position: relative;
      z-index: 3;
      padding-bottom: 1.4rem;
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      line-height: 1.45;
      color: var(--ink-soft);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.55rem 0.9rem;
    }

    .footer-links span {
      color: #c8d7e6;
    }

    footer a:hover {
      color: var(--ink);
    }

    .copyright {
      color: #9db9d1;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .hero {
        min-height: 64vh;
        padding-top: 5.6rem;
      }

      .content {
        max-width: 33rem;
        margin-left: 0;
      }

      .background-ecosystem {
        right: -24%;
        top: 20%;
        width: min(96vw, 760px);
        opacity: 0.78;
      }
    }

    @media (max-width: 640px) {
      :root {
        --page-x: 1.65rem;
      }

      .header-inner {
        gap: 1.25rem;
      }

      .brand {
        letter-spacing: 0.17em;
      }

      .subbrand {
        margin-top: 0.5rem;
        letter-spacing: 0.25em;
      }

      .icons {
        gap: 0.85rem;
        padding-top: 0.55rem;
      }

      .icons svg {
        width: 0.9rem;
        height: 0.9rem;
      }

      .hero {
        min-height: 62vh;
        padding-top: 4.9rem;
        padding-bottom: 3.8rem;
      }

      .content {
        max-width: 30rem;
      }

      h1 {
        line-height: 1.43;
      }

      .accent {
        width: 4.5rem;
        margin-top: 1.6rem;
      }

      .background-ecosystem {
        right: -78%;
        top: 32%;
        width: 185vw;
        opacity: 0.58;
      }

      .footer-inner {
        align-items: flex-start;
      }

      .copyright {
        width: 100%;
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="background-ecosystem" aria-hidden="true">
      <svg viewBox="0 0 900 700" focusable="false">
        <!-- large elegant orbital forms -->
        <ellipse class="orbital-soft" cx="535" cy="335" rx="320" ry="205" transform="rotate(-18 535 335)" />
        <ellipse class="orbital" cx="535" cy="335" rx="250" ry="155" transform="rotate(-18 535 335)" />
        <ellipse class="orbital-soft" cx="535" cy="335" rx="165" ry="102" transform="rotate(-18 535 335)" />

        <!-- main relationship arcs -->
        <path class="arc" d="M292 240 C392 160, 520 150, 655 220" />
        <path class="arc" d="M655 220 C710 295, 705 385, 635 470" />
        <path class="arc" d="M635 470 C520 540, 390 520, 302 430" />
        <path class="arc" d="M302 430 C250 355, 245 295, 292 240" />

        <!-- inner alignment arcs -->
        <path class="arc-soft" d="M365 265 C450 235, 540 240, 608 290" />
        <path class="arc-soft" d="M608 290 C602 370, 555 430, 474 455" />
        <path class="arc-soft" d="M474 455 C402 430, 358 365, 365 265" />

        <!-- crossing but quiet connections -->
        <path class="arc-soft" d="M292 240 C410 330, 510 390, 635 470" />
        <path class="arc-soft" d="M302 430 C420 330, 522 270, 655 220" />

        <!-- nodes -->
        <circle class="node" cx="292" cy="240" r="26" />
        <circle class="node" cx="655" cy="220" r="28" />
        <circle class="node" cx="635" cy="470" r="25" />
        <circle class="node" cx="302" cy="430" r="24" />

        <!-- core -->
        <circle class="node-core" cx="505" cy="350" r="34" />
        <circle class="node-core" cx="505" cy="350" r="64" />

        <!-- secondary nodes -->
        <circle class="node" cx="365" cy="265" r="13" />
        <circle class="node" cx="608" cy="290" r="13" />
        <circle class="node" cx="474" cy="455" r="13" />
        <circle class="node" cx="438" cy="226" r="10" />
        <circle class="node" cx="560" cy="498" r="10" />

        <!-- tiny dots -->
        <circle class="small-dot" cx="376" cy="196" r="3" />
        <circle class="small-dot" cx="508" cy="186" r="3" />
        <circle class="small-dot" cx="706" cy="320" r="3" />
        <circle class="small-dot" cx="686" cy="398" r="3" />
        <circle class="small-dot" cx="408" cy="515" r="3" />
        <circle class="small-dot" cx="254" cy="346" r="3" />
      </svg>
    </div>

    <header>
      <div class="frame header-inner">
        <div class="brand-block" aria-label="Marbeau Advisory">
          <div class="brand">Marbeau</div>
          <div class="subbrand">Advisory</div>
        </div>

        <nav class="icons" aria-label="Contact links">
          <a href="mailto:info@marbeauadvisory.com" aria-label="Email Marbeau Advisory">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.75 6.75h16.5a1.5 1.5 0 0 1 1.5 1.5v7.5a1.5 1.5 0 0 1-1.5 1.5H3.75a1.5 1.5 0 0 1-1.5-1.5v-7.5a1.5 1.5 0 0 1 1.5-1.5z" />
              <path d="M3 8l9 6 9-6" />
            </svg>
          </a>

          <a
            href="https://www.linkedin.com/in/kristaoldfield/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit LinkedIn profile"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 9.5v7.5" />
              <path d="M7 6.5h.01" />
              <path d="M11.5 17V9.5" />
              <path d="M11.5 12.75c0-1.8 1.17-3.25 3-3.25s3 1.45 3 3.25V17" />
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <main>
      <section class="frame hero">
        <div class="content">
          <h1>
            Marbeau advises companies, funds, and mission-driven organizations on how to expand across markets, strengthen positioning, and build the ecosystem needed to access aligned capital.
          </h1>

          <div class="accent" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <footer>
      <div class="frame footer-inner">
        <div class="footer-links">
          <a href="mailto:info@marbeauadvisory.com">info@marbeauadvisory.com</a>
          <span aria-hidden="true">•</span>
          <a
            href="https://www.linkedin.com/in/kristaoldfield/"
            target="_blank"
            rel="noopener noreferrer"
          >
            LinkedIn
          </a>
        </div>

        <div class="copyright">
          © 2026 Marbeau Advisory. All rights reserved.
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
