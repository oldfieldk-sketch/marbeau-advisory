
<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marbeau Advisory</title>

  <meta
    name="description"
    content="Marbeau advises companies, funds, and mission-driven organizations on how to expand across markets, strengthen positioning, and build the ecosystem needed to access aligned capital."
  />

  <style>
    :root {
      --bg: #fdfefe;
      --ink: #174a73;
      --ink-soft: #6f90ac;
      --line: #c8d9e8;
      --graphic: #2f6a97;
      --graphic-soft: #9cb8cf;
      --graphic-faint: rgba(47, 106, 151, 0.08);

      --page-x: clamp(1.75rem, 4.8vw, 4.75rem);
      --top-y: clamp(2rem, 3vw, 3rem);

      --brand-size: clamp(1.8rem, 1.35rem + 0.9vw, 2.3rem);
      --subbrand-size: clamp(0.82rem, 0.72rem + 0.18vw, 1rem);
      --hero-size: clamp(1.18rem, 0.95rem + 0.8vw, 1.72rem);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    .frame {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding-left: var(--page-x);
      padding-right: var(--page-x);
    }

    header {
      position: relative;
      z-index: 3;
      padding-top: var(--top-y);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .brand {
      font-size: var(--brand-size);
      line-height: 1;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: normal;
      color: var(--ink);
    }

    .subbrand {
      margin-top: 0.58rem;
      font-family: Arial, sans-serif;
      font-size: var(--subbrand-size);
      line-height: 1;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .icons {
      display: flex;
      align-items: center;
      gap: 1.45rem;
      padding-top: 0.8rem;
      font-family: Arial, sans-serif;
    }

    .icons a {
      color: var(--ink-soft);
      display: inline-grid;
      place-items: center;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .icons a:hover {
      color: var(--ink);
      transform: translateY(-1px);
    }

    .icons svg {
      width: 0.95rem;
      height: 0.95rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    main {
      position: relative;
      z-index: 2;
    }

    .hero {
      display: grid;
      align-items: start;
      min-height: 62vh;
      padding-top: clamp(5.8rem, 14vh, 9.2rem);
      padding-bottom: clamp(4rem, 8vh, 6rem);
    }

    .content {
      max-width: 35rem;
      margin-left: clamp(0.5rem, 2.4vw, 2.5rem);
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: var(--hero-size);
      line-height: 1.4;
      letter-spacing: -0.012em;
      font-weight: normal;
      color: var(--ink);
    }

    .accent {
      width: 5.2rem;
      height: 2px;
      background: var(--line);
      margin-top: 1.9rem;
      border-radius: 999px;
    }

    .background-ecosystem {
      position: absolute;
      right: -3%;
      top: 14%;
      width: min(58vw, 820px);
      height: auto;
      z-index: 1;
      pointer-events: none;
      opacity: 0.92;
    }

    .background-ecosystem svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .eco-ring {
      fill: none;
      stroke: rgba(47, 106, 151, 0.11);
      stroke-width: 1.1;
    }

    .eco-link {
      fill: none;
      stroke: rgba(47, 106, 151, 0.18);
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .eco-link-soft {
      fill: none;
      stroke: rgba(47, 106, 151, 0.11);
      stroke-width: 1;
      stroke-dasharray: 3 7;
      stroke-linecap: round;
    }

    .eco-node {
      fill: #ffffff;
      stroke: rgba(47, 106, 151, 0.28);
      stroke-width: 1.1;
    }

    .eco-node-soft {
      fill: rgba(47, 106, 151, 0.06);
      stroke: rgba(47, 106, 151, 0.13);
      stroke-width: 1;
    }

    .eco-core {
      fill: rgba(47, 106, 151, 0.08);
      stroke: rgba(47, 106, 151, 0.20);
      stroke-width: 1.2;
    }

    .eco-dot {
      fill: rgba(47, 106, 151, 0.30);
    }

    footer {
      position: relative;
      z-index: 3;
      padding-bottom: 1.4rem;
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      line-height: 1.45;
      color: var(--ink-soft);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.55rem 0.9rem;
    }

    .footer-links span {
      color: #c8d7e6;
    }

    footer a:hover {
      color: var(--ink);
    }

    .copyright {
      color: #9db9d1;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .hero {
        min-height: 64vh;
        padding-top: 5.6rem;
      }

      .content {
        max-width: 33rem;
        margin-left: 0;
      }

      .background-ecosystem {
        right: -14%;
        top: 22%;
        width: min(82vw, 760px);
        opacity: 0.8;
      }
    }

    @media (max-width: 640px) {
      :root {
        --page-x: 1.65rem;
      }

      .header-inner {
        gap: 1.25rem;
      }

      .brand {
        letter-spacing: 0.17em;
      }

      .subbrand {
        margin-top: 0.5rem;
        letter-spacing: 0.25em;
      }

      .icons {
        gap: 0.85rem;
        padding-top: 0.55rem;
      }

      .icons svg {
        width: 0.9rem;
        height: 0.9rem;
      }

      .hero {
        min-height: 62vh;
        padding-top: 4.9rem;
        padding-bottom: 3.8rem;
      }

      .content {
        max-width: 30rem;
      }

      h1 {
        line-height: 1.43;
      }

      .accent {
        width: 4.5rem;
        margin-top: 1.6rem;
      }

      .background-ecosystem {
        right: -46%;
        top: 31%;
        width: 150vw;
        opacity: 0.62;
      }

      .footer-inner {
        align-items: flex-start;
      }

      .copyright {
        width: 100%;
        white-space: normal;
      }
    }
  </style>
</head>
